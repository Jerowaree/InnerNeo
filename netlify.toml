[build]
  command = "pnpm run build"
  publish = "dist"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "FORMSPREE_ENDPOINT,PUBLIC_TURNSTILE_SITE_KEY"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://challenges.cloudflare.com https://translate.google.com https://translate.googleapis.com; style-src 'self' 'unsafe-inline' https://db.onlinewebfonts.com https://translate.googleapis.com; img-src 'self' data: https://images.unsplash.com https://www.vectorlogo.zone https://translate.googleapis.com https://translate.google.com; font-src 'self' data: https://db.onlinewebfonts.com; connect-src 'self' https://formspree.io https://translate.googleapis.com; frame-src 'self' https://challenges.cloudflare.com"
