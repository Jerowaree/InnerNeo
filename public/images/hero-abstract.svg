  </defs>

  <rect width="1200" height="800" fill="none" />
  <g filter="url(#f)">
    <circle cx="920" cy="180" r="260" fill="url(#g)" opacity="0.55" />
    <circle cx="980" cy="460" r="160" fill="#EDE7FF" opacity="0.22" />
    <rect x="640" y="320" width="420" height="220" rx="28" fill="url(#g)" opacity="0.09" />
  </g>

  <g transform="translate(80,120) scale(0.6)">
    <rect x="520" y="120" width="440" height="260" rx="16" fill="#0f1724" opacity="0.03" />
    <rect x="540" y="140" width="400" height="200" rx="12" fill="#fff" opacity="0.04" />
  </g>
</svg>
